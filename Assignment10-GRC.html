<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Favorite Michael Jackson Songs</title>
	
<style>
	@font-face {
		font-family: Candara;
		src: url("Candara.ttf")
	}
	body{
		background: offwhite;
	} h1 {
        font: 48pt/1.4em Candara;
        text-align: center;
        text-shadow: 1px 2px 3px rgba(255, 229, 180, 0.8);
        margin: 24px 0;
	} #page {
		max-width: 1024px;
		width:100%;
		background: offwhite;
		margin: 0 auto;
	} table {
		margin:48px auto;
		font: 17pt/1.4em Candara;
		border-collapse: collapse;
		border: 1px solid dimgray;
		box-shadow: 2px 3px 6px dimgray;
		background: url("mj-background2.jpg");
		background-size: cover;
		background-repeat:no-repeat;
		background-position:center;
		width: 75%;
		max-width: 700px;
	} td {
		padding: 6px 12px;
	} tr:nth-child(odd) {
		background: rgba(255,229,180,0.55)
	} tr:nth-child(even) {
		background: rgba(255,229,180,0.35)
	} @media only screen and (max-width:750px) {
		table {
		margin: auto;
		width: 80vw;
		align-content: center;
		} p {
			font: 18pt/1.6em Georgia;
			width: 80%;
			margin: auto;
		} #page {
			width: 100%
		}
	} .mjpic {
		width: 10%;
		position: relative;
		right:-600px;
		animation-name:moonwalk;
		animation-duration:8s;
		animation-fill-mode:forwards;
		animtation-timing-function: linear;
	} .mjpic:hover {
		animation-play-state: running;
	} @keyframes moonwalk{
		0% {right: -700px;}
		100% {right:-100px;}
	}
	
	
	
	
	</style>
</head>

<body>
	<div id="page">
		<h1>Tables</h1>
		<table>
			<tr>
				<th colspan="3">My Favorite Michael Jackson Songs</th>
			</tr>
			<tr>
				<th>Song</th>
				<th>Album</th>
				<th>Year</th>
			</tr>
			<tr>
				<td> Billie Jean</td>
				<td> Thriller</td>
				<td> 1982</td>
			</tr>
			<tr>
				<td> Thriller</td>
				<td> Thriller</td>
				<td> 1982</td>
			</tr>
			<tr>
				<td> Beat It</td>
				<td> Thriller</td>
				<td> 1982</td>
			</tr>
			<tr>
				<td> Smooth Criminal</td>
				<td> Bad</td>
				<td> 1987</td>
			</tr>
			<tr>
				<td> Man in the Mirror</td>
				<td> Bad</td>
				<td> 1987</td>
			</tr>
			<tr>
				<td> Black or White</td>
				<td> Dangerous</td>
				<td> 1991</td>
			</tr>
			<tr>
				<td> Remember the Time</td>
				<td> Dangerous</td>
				<td> 1991</td>
			</tr>
			<tr>
				<td> Dirty Diana </td>
				<td> Bad</td>
				<td> 1987</td>
			</tr>
		</table>
	<img src="mjmoonwalk.png" alt="Michael Jackson" class="mjpic">	
	</div>
</body>
</html>
