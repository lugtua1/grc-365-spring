<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<title>Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Satisfy&display=swap" rel="stylesheet">
<style>
    * {
        margin: 0;
        padding: 0;
    } @font-face {
        font-family: Candara;
        src: url("Candara.ttf");
    } h1 {
        font: 48pt/1.4em Satisfy;
        text-align: center;
        text-shadow: 1px 2px 3px rgba(163, 22, 0, 0.8);
        margin: 24px 0;
		background-color:antiquewhite;
    } #textbox {
        width: 1024px;
        height: 928px;
        margin: 0 auto;
        background-color: antiquewhite;
        box-shadow: 2px 3px 6px gainsboro;
        border: 1px solid gainsboro;
		display: flex;
		justify-content: center;
		align-items: flex-start;
		align-content: flex-start;
		flex-wrap: wrap;
    } figure {
        margin: 24px;
    } img, .zoom {
        width: 200px;
        height: 250px;
        border: 1px solid gray;
        box-shadow: 2px 3px 6px gray;
        transition: transform 0.5s;
    } figcaption {
        font: 12pt/1.4em Candara;
        margin-top: 3px;
    } .zoom {
        background: url("thumb-tulip.jpg");
        background-size: 100%;
        background-position: center;
    } img:hover {
        transform: scale(1.03);
        transition: transform 0.5s;
    } .zoom:hover {
        background-size: 105%;
        transition: background-size 0.5s;
    }
</style>
</head>

<body>
    <h1>Portfolio</h1>
    <div id="textbox">
        <!-- Leaves photo -->
        <figure>
			<a href= "image1.jpg">
            <img src="image1_thumbnail.jpg" />
			</a>
            <figcaption>
           Character Art by Andrea Lugtu
            </figcaption>
        </figure>
		 <figure>
			<a href= "image2.jpg">
            <img src="image2_thumbnail.jpg" />
			</a>
            <figcaption>
           Character Art by Andrea Lugtu
            </figcaption>
        </figure>
		 <figure>
			<a href= "image0 (2).jpeg">
            <img src="image0 (2)_thumbnail.jpg" />
			</a>
            <figcaption>
           Character Art by Andrea Lugtu
            </figcaption>
        </figure>
    </div>
</body>
</html>
