<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<title>Commission Request</title>
	<link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&display=swap" rel="stylesheet">
<style>
	@font-face {
        font-family: Candara;
        src: url("Candara.ttf");
		} h1 {
        text-align: center;
        font-weight: normal;
		color: darkred;
    } body{
		background: #f4efe7;
	} #page{
		width: 1024px;
		max-width: 95%;
		background: #fffaf5;
		border: 1px solid #c8b8a8;
		box-shadow: 2px 3px 6px #cbb9ad;
		margin: 50px auto;
	}#banner{
		width:100%;
	}form {
        width: 600px;
		max-width: 95%;
        min-height: 600px;
        padding: 24px;
        background: #f3e3d3;
        margin: 36px auto;
        border: 1px solid darkred;
        box-shadow: 2px 3px 6px gray;
        border-radius: 18px;
        font: 14pt/1.2em Candara;
    } fieldset {
        margin-top: 18px;
		border: 2px solid darkred;
    } #personal input, #submit {
        width: 100%;
        height: 24px;
        margin-bottom: 12px;
	} input[type="text"] {
		width: 98%;
		font: 14pt/1.4em Candara;
		margin-top: 6px;
	} input[type="submit"] {
		width: 100px;
		height: 40px;
		background: #8b5e3c;
		margin: 6px auto;
		display: block;
		border-radius: 6px;
		border: 1px solid dimgray;
		font: 14pt/1.4em Candara;
		color: white;
	} h1{
    	text-align:center;
    	font-family: 'Bubblegum Sans', cursive;
   		font-size: 42px;
    	color:#8b5e3c;
    	margin-bottom: 10px;
	}textarea{
    	width: 98%;
   		padding: 5px;
    	font: 14pt/1.4em Candara;
    	border: 1px solid #c8b8a8;
   		border-radius: 10px;
    	margin-top: 6px;
}	textarea::placeholder{
    color: #b3a6a0;
}   @media only screen and (max-width:750px) {
		#page {
			width: 95%;
			height: auto;
			margin: 20px auto;
		} h1 {
			font-size: 36pt;
		} p {
			width: 90%;
			font-size: 12pt;
		} .text-img {
			width:100%;
			float: none;
			margin: 0 0 30px 0;
		} button {
			width: 80%;
			font-size: 16pt;
	} form {
		width: 95%;
		padding: 16px;
	}

	
	</style>
</head>

<body>
	<div id="page">
	<img id="banner" src="header twitter.webp"/>
	 <form action="https://formsubmit.co/lugtua1@unlv.nevada.edu" method="post">
    <h1>Commission Request</h1>
		 <fieldset>
<legend>Client Information</legend>
		<input type="text" /><br/>
		<label>Full Name</label><br/>
		<input type="text"/><br/>
		<label>Email Address</label><br/>
		 </fieldset>
		<fieldset>
			<legend>Select Your Commission Package</legend>
		<input type="radio"> 
		<label>Sketch Commission</label><br/>
		<input type="radio"> 
		<label>Flat Color</label><br/>
		<input type="radio"> 
		<label>Full Illustration</label><br/>
		<input type="radio"> 
		<label>Deluxe Scene</label><br/>
		</fieldset>
		 <fieldset>
			<legend>What Type of Artwork Are You Looking For?</legend>
			<input type="checkbox" name="foo">
			<label>Character Illustration</label><br/>
			<input type="checkbox" name="foo">
			<label>Portrait</label><br/>
			<input type="checkbox" name="foo">
			<label>Fan Art</label><br/>
			<input type="checkbox" name="foo">
			 <label>Original Character</label><br/>
			<input type="checkbox" name="foo">
			<label>Other</label><br/>
		</fieldset>
		 <fieldset>
		<legend>Project Details</legend>
		<label>Describe Your Commission Idea</label>
			<textarea rows="9" placeholder="Include poses, color, themes, references, personality details, background ideas, etc."></textarea>
			<input type="submit" />
		</fieldset>
    </form>
	</div>
</body>
</html>
