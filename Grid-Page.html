<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>About Me</title>
	<link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&display=swap" rel="stylesheet">
<style>
	body{
		background: #f4efe7;
	} #page{
		width: 1024px;
		max-width: 95%;
		height: auto;
		background: #fffaf5;
		border: 1px solid #c8b8a8;
		box-shadow: 2px 3px 6px #cbb9ad;
		margin: 0 auto;
	}  #banner{
		width:100%;
	}   h1 {
		text-align: center;
		font-family: 'Bubblegum Sans';
		font-size: 60pt;
		font: 60pt/1.4em 'Bubblegum Sans', script;
		color: #6f4e37;
		text-shadow: 2px 3px 6px #d9a5a0;
	} p {
		font: 14pt/1.4em Baskerville, "Palatino Linotype", Palatino, "Century Schoolbook L", "Times New Roman", "serif";
		width: 80%;
		max-width: 800px;
		letter-spacing: 1px;
		margin: 12px auto;
		color: #6d5b4d;
	} main {
 		display: grid;
		grid-template-columns: repeat(2, 1fr);
		gap: 12px;
		width: 90%;
		max-width: 768px;
		margin: 24px auto;
}	 main img {
		width: 100%;
		height: 250px;
		object-fit: cover;
		display: block;
		border-radius: 6px;
	} button {
		background: #c98b98;
		color: white;
		font-family: 'Bubblegum Sans';
		font-size: 18pt;
		padding: 10px 24px;
		border-radius: 12px;
		border: none;
		box-shadow: 2px 3px 6px #cbb9ad;
		display: block;
		margin: 40px auto;
		cursor: pointer;
		transition: 0.3s ease;
	} @media only screen and (max-width:750px) {
		#page {
			width: 95%;
			height: auto;
			margin: 20px auto;
		} h1 {
			font-size: 36pt;
		} p {
			width: 90%;
			font-size: 12pt;
		} .text-img {
			width:100%;
			float: none;
			margin: 0 0 30px 0;
		} button {
			width: 80%;
			font-size: 16pt;
		} main {
	grid-template-columns: 1fr;
		}
	}
	</style>

</head>

<body>
	<div id="page">

	</div>
	</div>
	
</body>
</html>
